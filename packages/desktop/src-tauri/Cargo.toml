[package]
name = "codey-desktop"
version = "0.1.0"
description = "Codey Desktop"
edition = "2021"

[lib]
name = "codey_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.1", features = [] }

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
rustyscript = { version = "0.12.3", default-features = false, features = ["node_experimental"] }
serde = { version = "=1.0.221", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.11.1", features = [] }
tauri-plugin-updater = "2.10.1"
tokio = { version = "1", features = ["io-util", "process", "sync", "time"] }
tokio-tungstenite = { version = "0.28", features = ["rustls-tls-webpki-roots"] }
url = "2"
uuid = { version = "1", features = ["v4"] }
