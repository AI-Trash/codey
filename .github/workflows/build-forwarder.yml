name: build-forwarder

on:
  push:
    branches:
      - main
    paths:
      - 'forwarder/**'
      - '.github/workflows/build-forwarder.yml'
  pull_request:
    paths:
      - 'forwarder/**'
      - '.github/workflows/build-forwarder.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        working-directory: forwarder

      - name: Require signing secrets
        run: |
          test -n "${CODEY_ANDROID_SIGNING_KEYSTORE_BASE64}"
          test -n "${CODEY_ANDROID_SIGNING_STORE_PASSWORD}"
          test -n "${CODEY_ANDROID_SIGNING_KEY_ALIAS}"
          test -n "${CODEY_ANDROID_SIGNING_KEY_PASSWORD}"
        env:
          CODEY_ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.CODEY_ANDROID_SIGNING_KEYSTORE_BASE64 }}
          CODEY_ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.CODEY_ANDROID_SIGNING_STORE_PASSWORD }}
          CODEY_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.CODEY_ANDROID_SIGNING_KEY_ALIAS }}
          CODEY_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.CODEY_ANDROID_SIGNING_KEY_PASSWORD }}

      - name: Decode signing keystore
        run: |
          mkdir -p signing
          printf '%s' "${CODEY_ANDROID_SIGNING_KEYSTORE_BASE64}" | base64 --decode > signing/codey-forwarder.jks
        working-directory: forwarder
        env:
          CODEY_ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.CODEY_ANDROID_SIGNING_KEYSTORE_BASE64 }}

      - name: Build and verify debug APK signatures
        run: ./gradlew verifyDebugApkSignatures --no-daemon
        working-directory: forwarder
        env:
          CODEY_ANDROID_SIGNING_STORE_FILE: ${{ github.workspace }}/forwarder/signing/codey-forwarder.jks
          CODEY_ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.CODEY_ANDROID_SIGNING_STORE_PASSWORD }}
          CODEY_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.CODEY_ANDROID_SIGNING_KEY_ALIAS }}
          CODEY_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.CODEY_ANDROID_SIGNING_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codey-forwarder-debug-apk
          if-no-files-found: error
          path: |
            forwarder/app/build/outputs/apk/debug/app-debug.apk
            forwarder/app/build/outputs/apk/debug/output-metadata.json
            forwarder/automator-host/build/outputs/apk/debug/automator-host-debug.apk
            forwarder/automator-host/build/outputs/apk/debug/output-metadata.json
