services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: codey
      POSTGRES_USER: codey
      POSTGRES_PASSWORD: codey
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codey -d codey"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://codey:codey@postgres:5432/codey
      APP_BASE_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
